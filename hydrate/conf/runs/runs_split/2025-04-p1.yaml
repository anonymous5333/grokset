defaults:
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

hydra:
  run:
    dir: .
  job:
    chdir: false

date:
  year: 2025
  month: 4
  since_day: 1
  until_day: 15

settings:
  handle: grok
  query_type: Latest
  include_self_threads: false
  include_quotes: false
  include_retweets: false
  block_hours: 6
  number_conversations: 300
  build_final_json: false
  out_path: grok_data/${date.year}-${date.month}-${date.since_day}to${date.until_day}.json
  grok_db_outpath: grok_data/grok_2025_04/grok.sqlite3

logging:
  run_name: p1
  log_dir: logs/crawl_2025-04
  to_stdout: false
